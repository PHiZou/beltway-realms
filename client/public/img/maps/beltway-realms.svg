<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="parchment" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5ead2"/>
      <stop offset="50%" stop-color="#ede0c4"/>
      <stop offset="100%" stop-color="#e1cfaa"/>
    </linearGradient>

    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b6a8c"/>
      <stop offset="100%" stop-color="#2b5070"/>
    </linearGradient>

    <pattern id="terrain" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#c4a87a" opacity="0.3"/>
      <circle cx="60" cy="50" r="1" fill="#c4a87a" opacity="0.2"/>
      <circle cx="40" cy="70" r="0.8" fill="#c4a87a" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Parchment background -->
  <rect x="0" y="0" width="1200" height="800" fill="url(#parchment)"/>
  <rect x="0" y="0" width="1200" height="800" fill="url(#terrain)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="760" fill="none" stroke="#8a6b3b" stroke-width="2" opacity="0.5" rx="4"/>
  <rect x="26" y="26" width="1148" height="748" fill="none" stroke="#8a6b3b" stroke-width="1" opacity="0.3" rx="2"/>

  <!-- Compass rose (top-right) -->
  <g opacity="0.2" transform="translate(1080, 120)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="#3a2a12" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#3a2a12" stroke-width="0.5"/>
    <path d="M0 -52 L6 0 L0 52 L-6 0 Z" fill="#3a2a12"/>
    <path d="M-52 0 L0 -6 L52 0 L0 6 Z" fill="#3a2a12"/>
    <path d="M0 -52 L-6 0 L0 52" fill="#5a4520"/>
    <path d="M-52 0 L0 6 L52 0" fill="#5a4520"/>
    <text x="0" y="-58" text-anchor="middle" font-family="serif" font-size="12" fill="#3a2a12">N</text>
  </g>

  <!-- The Potomac Divide - a wider, more prominent river east of Arlington -->
  <path d="M820 0
           C810 80, 840 150, 820 220
           C800 290, 830 340, 810 400
           C790 460, 820 510, 800 570
           C780 630, 810 690, 790 800"
        fill="none" stroke="url(#water)" stroke-width="28" opacity="0.25" stroke-linecap="round"/>
  <path d="M820 0
           C810 80, 840 150, 820 220
           C800 290, 830 340, 810 400
           C790 460, 820 510, 800 570
           C780 630, 810 690, 790 800"
        fill="none" stroke="url(#water)" stroke-width="8" opacity="0.4" stroke-linecap="round"/>

  <!-- Beltway ring (I-495 / Capital Beltway) -->
  <ellipse cx="680" cy="420" rx="240" ry="200"
           fill="none" stroke="#6b5030" stroke-width="3" opacity="0.2"
           stroke-dasharray="12 6" transform="rotate(-8 680 420)"/>

  <!-- Road network connecting regions -->
  <g stroke="#6b5030" stroke-width="3" opacity="0.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ashburn to Reston -->
    <path d="M165 340 C220 330, 260 310, 340 300"/>
    <!-- Reston to Tysons -->
    <path d="M365 300 C410 290, 450 280, 530 285"/>
    <!-- Tysons to Arlington -->
    <path d="M555 290 C600 310, 640 340, 690 380"/>
    <!-- Arlington to DC (crossing Potomac) -->
    <path d="M715 390 C750 390, 800 370, 935 310"/>
    <!-- Herndon spur -->
    <path d="M260 310 L290 380"/>
    <!-- Pentagon spur -->
    <path d="M700 400 L680 490"/>
    <!-- Alexandria spur -->
    <path d="M800 570 L750 560"/>
  </g>

  <!-- Subtle terrain shading - western hills -->
  <g opacity="0.08">
    <ellipse cx="120" cy="300" rx="100" ry="140" fill="#6b5030"/>
    <ellipse cx="250" cy="450" rx="80" ry="100" fill="#6b5030"/>
  </g>

  <!-- Region markers on the SVG (decorative only, interactive ones are overlaid) -->
  <g filter="url(#softGlow)">
    <!-- Ashburn -->
    <circle cx="150" cy="340" r="16" fill="#3a2a12" opacity="0.8"/>
    <circle cx="150" cy="340" r="9" fill="#f2e6c9"/>

    <!-- Reston -->
    <circle cx="345" cy="298" r="14" fill="#3a2a12" opacity="0.75"/>
    <circle cx="345" cy="298" r="8" fill="#f2e6c9"/>

    <!-- Herndon (minor) -->
    <circle cx="290" cy="385" r="10" fill="#3a2a12" opacity="0.6"/>
    <circle cx="290" cy="385" r="6" fill="#f2e6c9"/>

    <!-- Tysons -->
    <circle cx="540" cy="285" r="14" fill="#3a2a12" opacity="0.75"/>
    <circle cx="540" cy="285" r="8" fill="#f2e6c9"/>

    <!-- Arlington -->
    <circle cx="700" cy="385" r="15" fill="#3a2a12" opacity="0.8"/>
    <circle cx="700" cy="385" r="8" fill="#f2e6c9"/>

    <!-- Pentagon (minor) -->
    <circle cx="680" cy="495" r="10" fill="#3a2a12" opacity="0.6"/>
    <circle cx="680" cy="495" r="6" fill="#f2e6c9"/>

    <!-- The Citadel / DC (east of Potomac) -->
    <circle cx="940" cy="300" r="18" fill="#3a2a12" opacity="0.85"/>
    <circle cx="940" cy="300" r="10" fill="#f2e6c9"/>

    <!-- Alexandria (minor, east of Potomac) -->
    <circle cx="745" cy="560" r="10" fill="#3a2a12" opacity="0.6"/>
    <circle cx="745" cy="560" r="6" fill="#f2e6c9"/>
  </g>

  <!-- Region labels -->
  <g font-family="serif" fill="#2a1c0b">
    <text x="150" y="310" text-anchor="middle" font-size="17" opacity="0.7">Ashburn</text>
    <text x="150" y="325" text-anchor="middle" font-size="12" opacity="0.45">Data Dominion</text>

    <text x="345" y="268" text-anchor="middle" font-size="17" opacity="0.7">Reston</text>
    <text x="345" y="283" text-anchor="middle" font-size="12" opacity="0.45">Node</text>

    <text x="290" y="415" text-anchor="middle" font-size="13" opacity="0.45">Herndon Gate</text>

    <text x="540" y="255" text-anchor="middle" font-size="17" opacity="0.7">Tysons</text>
    <text x="540" y="270" text-anchor="middle" font-size="12" opacity="0.45">Spires</text>

    <text x="700" y="355" text-anchor="middle" font-size="17" opacity="0.7">Arlington</text>
    <text x="700" y="370" text-anchor="middle" font-size="12" opacity="0.45">Nexus</text>

    <text x="680" y="525" text-anchor="middle" font-size="13" opacity="0.45">Pentagon Bastion</text>

    <text x="940" y="270" text-anchor="middle" font-size="19" opacity="0.75">The Citadel</text>
    <text x="940" y="288" text-anchor="middle" font-size="13" opacity="0.5">(Washington, D.C.)</text>

    <text x="745" y="590" text-anchor="middle" font-size="13" opacity="0.45">Alexandria Archives</text>

    <!-- Potomac label along the river -->
    <text font-size="16" opacity="0.35" letter-spacing="4">
      <textPath href="#potomac-label-path">The Potomac Divide</textPath>
    </text>
  </g>

  <!-- Hidden path for Potomac label to follow -->
  <path id="potomac-label-path"
        d="M850 120 C840 200, 860 260, 845 330 C830 400, 850 450, 835 520"
        fill="none" stroke="none"/>

  <!-- Title block -->
  <text x="55" y="82" font-family="serif" font-size="40" fill="#2a1c0b" opacity="0.85" letter-spacing="1">
    The Beltway Realms
  </text>
  <text x="57" y="110" font-family="serif" font-size="16" fill="#2a1c0b" opacity="0.55">
    A parchment chart of Northern Virginia &amp; the Citadel of Washington
  </text>

  <!-- Scale indicator -->
  <g transform="translate(55, 720)" opacity="0.3">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#3a2a12" stroke-width="2"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#3a2a12" stroke-width="1.5"/>
    <line x1="100" y1="-4" x2="100" y2="4" stroke="#3a2a12" stroke-width="1.5"/>
    <text x="50" y="14" text-anchor="middle" font-family="serif" font-size="10" fill="#3a2a12">~10 leagues</text>
  </g>
</svg>
